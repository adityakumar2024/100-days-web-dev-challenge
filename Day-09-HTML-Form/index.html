<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>

        <h1>University Registration Form</h1>
        <p>Please fill out the form below to register.</p>

        <hr>

        <h2>Personal Details</h2>

        <label for="name">First Name:</label>
        <input type="text" name="name" id="name" placeholder="eg.aditya">

        <br><br>

        <label for="Lastname">Last Name:</label>
        <input type="text" name="Lastname" id="Lastname" placeholder="eg.Kumar">

        <br><br>

        <label for="dob">DOB:</label>
        <input type="date" name="dob" id="dob" placeholder="">

        <h3>Gender</h3>

        <label for="male">Male</label>
        <input type="radio" name="male" id="male" value="male">

        <br>

         <label for="female">FeMale</label>
        <input type="radio" name="female" id="female" value="female">
        <br>

         <label for="other">Other</label>
        <input type="radio" name="other" id="other" value="other">

        <br><br>

        <h3>Upload your photo</h3>
        <input type="file" name="file">

        <hr>

        <h2>Contect Information</h2>

        <label for="email">Email Address:</label>
        <input type="email" name="email" id="email">

        <br><br>

        <label for="phone">Phone:</label>
        <input type="tel" name="phone" id="name">

        <br><br>

        <label for="Address">Mailing Address</label>
        <br>
        <textarea name="address" id="Address"></textarea> 

        <h2>Academic information</h2>

        <label for="course">Select your course</label>
        <select name="course" id="couse">
        <option value="ME">ME</option>
        <option value="CE">CE</option>
        <option value="CSE">CSE</option>
        <option value="CSE">AIML</option>
        </select>

        <br><br>

        <h3>Extracurricular activities</h3>

        <label for="sports">Sports</label>
        <input type="checkbox" name="interest" id="soprts" value="sports">

        <br>

        <label for="Music">Music</label>
        <input type="checkbox" name="interest" id="music" value="music">

        <br>

        <label for="poetry">Poetry</label>
        <input type="checkbox" name="interest" id="poetry" value="poetry">

         <br>

        <label for="arts & craft">Arts & craft</label>
        <input type="checkbox" name="interest" id="arts & craft" value="Arts & craft">

        <br>

        <label for="technology">Technology</label>
        <input type="checkbox" name="interest" id="technology" value="technology">
         <br><br>

        <hr>

        <h2>Create your account</h2>

        <label for="pass">Create Password</label>
        <input type="password" name="password" id="password">
        <br><br>

        <label for="secu">Security answer</label>
        <input type="text" name="security" id="security">
        <hr>
        
        <button type="submit">Register</button>
        <button type="reset">Clear form</button>

    </form>
</body>
</html>
